name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Only read access is needed: this workflow just builds + verifies the Lean project.
# (The doc-site publishing step `docgen-action` was removed — it required a Jekyll/Gemfile
# + GitHub Pages setup this repo does not use, and only its Jekyll step was failing while
# the actual `lake build` succeeded. The README + source is the artifact.)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
